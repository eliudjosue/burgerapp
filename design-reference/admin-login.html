<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Burger House — Staff login</title>
<style>
:root {
  --bg: #faf9f6; --surface: #ffffff; --fg: #1c1a17; --muted: #6b6760;
  --border: #e5e1da; --accent: #d4532e; --accent-on: #ffffff;
  --accent-soft: color-mix(in oklch, var(--accent) 14%, transparent);
  --success: #1a9d5a; --warn: #e09d1a; --danger: #d43a3a;
  --font: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  --font-mono: ui-monospace, 'JetBrains Mono', monospace;
  --radius-sm: 8px; --radius-md: 16px; --radius-lg: 24px; --radius-pill: 9999px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{margin:0;background:var(--surface);color:var(--fg);font-family:var(--font);font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.login-box{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:32px 24px;width:100%;max-width:380px}
.login-box .brand{text-align:center;margin-bottom:24px}
.login-box .brand h1{font-size:24px;font-weight:800;color:var(--accent)}
.login-box .brand p{font-size:13px;color:var(--muted);margin-top:2px}
.field{margin-bottom:14px}
.field label{display:block;font-size:13px;font-weight:500;margin-bottom:4px}
.field input{width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:var(--font);font-size:14px;background:var(--bg);transition:border-color .15s}
.field input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.btn-login{width:100%;padding:14px;border-radius:var(--radius-pill);background:var(--accent);color:#fff;border:none;font-size:15px;font-weight:600;cursor:pointer;margin-top:6px;transition:transform .15s}
.btn-login:active{transform:scale(0.98)}
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--muted);font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.role-list{display:flex;flex-direction:column;gap:8px}
.role-btn{display:flex;align-items:center;gap:12px;padding:12px 14px;border:1px solid var(--border);border-radius:var(--radius-md);background:var(--bg);cursor:pointer;transition:all .15s;text-decoration:none;color:var(--fg)}
.role-btn:hover{border-color:var(--accent);background:var(--accent-soft)}
.role-btn .icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px}
.role-btn .info{flex:1}
.role-btn .info .name{font-size:14px;font-weight:600}
.role-btn .info .role{font-size:11px;color:var(--muted)}
.footer{text-align:center;margin-top:16px;font-size:12px;color:var(--muted)}
.footer a{color:var(--accent);text-decoration:none}
</style>
</head>
<body>
<div class="login-box">
  <div class="brand">
    <h1>🍔 Burger House</h1>
    <p>Panel de administración</p>
  </div>

  <div class="field">
    <label>Usuario</label>
    <input type="text" placeholder="Tu usuario de staff" value="admin">
  </div>
  <div class="field">
    <label>Contraseña</label>
    <input type="password" placeholder="••••••••" value="admin123">
  </div>
  <button class="btn-login" onclick="location.href='admin.html'">Ingresar</button>

  <div class="divider">Acceso rápido como</div>

  <div class="role-list">
    <a href="admin.html#cocina" class="role-btn">
      <div class="icon" style="background:#dbeafe;color:#1e40af">👨‍🍳</div>
      <div class="info">
        <div class="name">Cocina</div>
        <div class="role">Ver pedidos a preparar</div>
      </div>
    </a>
    <a href="admin.html#caja" class="role-btn">
      <div class="icon" style="background:#d1fae5;color:#065f46">💳</div>
      <div class="info">
        <div class="name">Caja</div>
        <div class="role">Gestionar pagos y entregas</div>
      </div>
    </a>
    <a href="admin.html#admin" class="role-btn">
      <div class="icon" style="background:#fef3c7;color:#92400e">⚙️</div>
      <div class="info">
        <div class="name">Admin</div>
        <div class="role">Dashboard, productos, reportes</div>
      </div>
    </a>
  </div>

  <div class="footer">
    <a href="site-home.html">← Volver al sitio público</a>
  </div>
</div>
</body>
</html>
